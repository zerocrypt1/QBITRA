version: "3.9"
services:
  mongodb:
    image: mongo:8
    restart: unless-stopped
    command: ["--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    env_file:
      - backend/.env.example
    environment:
      APP_ENV: production
      PORT: 8080
      MONGO_URI: mongodb://root:rootpass@mongodb:27017
      MONGO_DB_NAME: qbitra
      REDIS_ADDR: redis:6379
      COOKIE_SECURE: "false"
      CSRF_ENABLED: "false"
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo_data:
  redis_data:
